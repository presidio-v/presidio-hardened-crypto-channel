# Note: Fixed configuration to install package with "[dev]" extras so that
# pytest runs correctly in both CI and local dev environments.

name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'


permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Install dev extras so ruff/pytest are available
      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install with dev extras so pytest is available on all platforms
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: |
          python -m pytest
