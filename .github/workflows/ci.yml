# CI workflow for running tests and checks
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # get pip and dev dependencies ready
      - name: install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: check code formatting
        run: ruff format --check .
      - name: run ruff check
        run: ruff check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # get pip and dev dependencies ready
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # run the bootstrap tool
      - name: run bootstrap script
        run: python bootstrap.py
      # execute experiment commands to make sure they run without error
      - name: run experiments
        run: |
          python main.py --demo keyexchange --parties Alice Bob
          python main.py --demo symmetric --message "Hello from Alice" --key-size 256
          python main.py --demo channel --client Alice --server Bob --messages 10
          python main.py --demo channel --no-hmac --tamper
          python main.py --demo channel --messages 100 --duration 60
          python report.py --experiment 1
      - name: run pytest
        run: |
          python -m pytest
